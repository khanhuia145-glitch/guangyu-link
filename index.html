<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GUANGYU - AI Trading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .logo {
            font-size: 38px;
            font-weight: 600;
            letter-spacing: 6px;
            color: #ffffff;
            margin-bottom: 6px;
        }
        .logo span {
            color: #c9a96e;
        }

        .subtitle {
            font-size: 13px;
            font-weight: 400;
            color: #777;
            letter-spacing: 0.5px;
            margin-bottom: 40px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px 0;
            margin-bottom: 10px;
            border-radius: 0;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 1px;
            text-decoration: none;
            transition: background 0.2s;
            border: 1px solid rgba(255,255,255,0.08);
            color: #ddd;
            background: #111;
        }
        .btn-wa {
            border-bottom: 2px solid #25D366;
        }
        .btn-tg {
            border-bottom: 2px solid #2AABEE;
        }
        .btn:hover {
            background: #1a1a1a;
            color: #fff;
        }

        .footer {
            margin-top: 40px;
            font-size: 10px;
            color: #444;
            letter-spacing: 0.3px;
        }

        .lang-switch {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .lang-btn {
            background: transparent;
            border: 1px solid #222;
            color: #666;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            letter-spacing: 0.3px;
        }
        .lang-btn.active {
            color: #c9a96e;
            border-color: #c9a96e;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">GU<span>A</span>NGYU</div>
        <div class="subtitle" id="subtitle">AI-Driven Gold Trading · Equality</div>

        <a class="btn btn-wa" id="wa-btn" href="https://wa.me/17829074794?text=I%27m+interested+in+GUANGYU+EA" target="_blank">
            WhatsApp
        </a>
        <a class="btn btn-tg" id="tg-btn" href="https://t.me/+15627598087" target="_blank">
            Telegram
        </a>

        <div class="lang-switch" id="lang-switch">
            <button class="lang-btn active" onclick="switchLang('auto')">Auto</button>
            <button class="lang-btn" onclick="switchLang('en')">EN</button>
            <button class="lang-btn" onclick="switchLang('ko')">KO</button>
            <button class="lang-btn" onclick="switchLang('vi')">VI</button>
            <button class="lang-btn" onclick="switchLang('ms')">MS</button>
        </div>

        <div class="footer">
            © 2026 GUANGYU · Trading involves substantial risk.
        </div>
    </div>

    <script>
        const texts = {
            en: {
                subtitle: "AI-Driven Gold Trading · Equality",
                wa_link: "https://wa.me/17829074794?text=Hi%2C+I+want+to+know+more+about+GUANGYU+EA",
                tg_link: "https://t.me/+15627598087"
            },
            ko: {
                subtitle: "AI 골드 트레이딩 · 기술 평등",
                wa_link: "https://wa.me/17829074794?text=안녕하세요%2C+GUANGYU+EA에+대해+알고+싶습니다",
                tg_link: "https://t.me/+15627598087"
            },
            vi: {
                subtitle: "Giao Dịch Vàng AI · Bình Đẳng Công Nghệ",
                wa_link: "https://wa.me/17829074794?text=T%C3%B4i+mu%E1%BB%91n+bi%E1%BA%BFt+v%E1%BB%81+GUANGYU+EA",
                tg_link: "https://t.me/+15627598087"
            },
            ms: {
                subtitle: "Dagangan Emas AI · Kesamarataan Teknologi",
                wa_link: "https://wa.me/17829074794?text=Saya+berminat+dengan+GUANGYU+EA",
                tg_link: "https://t.me/+15627598087"
            }
        };

        function detectLanguage() {
            const lang = navigator.language || navigator.userLanguage;
            if (lang.startsWith('ko')) return 'ko';
            if (lang.startsWith('vi')) return 'vi';
            if (lang.startsWith('ms') || lang.startsWith('id')) return 'ms';
            return 'en';
        }

        let currentLang = detectLanguage();

        function applyLanguage(lang) {
            if (lang === 'auto') lang = detectLanguage();
            currentLang = lang;
            const t = texts[lang] || texts['en'];
            document.getElementById('subtitle').textContent = t.subtitle;
            document.getElementById('wa-btn').href = t.wa_link;
            document.getElementById('tg-btn').href = t.tg_link;

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                const btnText = btn.textContent.trim().toLowerCase();
                if ((lang === 'en' && btnText === 'en') ||
                    (lang === 'ko' && btnText === 'ko') ||
                    (lang === 'vi' && btnText === 'vi') ||
                    (lang === 'ms' && btnText === 'ms') ||
                    (lang === 'auto' && btnText === 'auto')) {
                    btn.classList.add('active');
                }
            });
        }

        function switchLang(lang) {
            applyLanguage(lang);
        }

        applyLanguage('auto');
    </script>
</body>
</html>
